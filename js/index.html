<!-- SECTION: ABOUT CEO (LUXURY REDESIGN) -->
<section id="about" class="section-pad about-ceo-section">
    <div class="container">
        <div class="about-ceo-grid">

            <!-- Left: CEO Image Column -->
            <div class="about-ceo-image-col reveal">
                <div class="ceo-image-wrapper">
                    <!-- Placeholder image: Nên dùng ảnh chân dung CEO mặc blouse trắng hoặc đồ spa cao cấp -->
                    <div class="ceo-image-placeholder">
                        <img src="https://images.unsplash.com/photo-1594824476967-48c8b964273f?q=80&w=800&auto=format&fit=crop"
                            alt="CEO Phạm Bảo Ngọc" class="ceo-main-image">
                    </div>
                    <div class="ceo-image-overlay"></div>

                    <!-- Experience Card Overlay -->
                    <div class="ceo-experience-card">
                        <div class="exp-number">10+</div>
                        <div class="exp-text">Năm Kinh Nghiệm<br>Thực Chiến</div>
                    </div>
                </div>
            </div>

            <!-- Right: Content Column -->
            <div class="about-ceo-content-col reveal">
                <div class="section-header text-left">
                    <span class="section-sub reveal" id="dyn_ceo_subtitle"></span>
                    <h2 class="section-title reveal" id="dyn_ceo_title"></h2>
                    <div class="ceo-description reveal" id="dyn_ceo_description"></div>
                </div>

                <ul class="ceo-bullet-points reveal">
                    <li><i data-lucide="shield-check"></i> <span id="dyn_ceo_bullet1"></span></li>
                    <li><i data-lucide="shield-check"></i> <span id="dyn_ceo_bullet2"></span></li>
                    <li><i data-lucide="shield-check"></i> <span id="dyn_ceo_bullet3"></span></li>
                    <li><i data-lucide="shield-check"></i> <span id="dyn_ceo_bullet4"></span></li>
                </ul>

                <!-- Quote Box with Glassmorphism -->
                <div class="ceo-quote-container reveal">
                    <div class="ceo-quote-box">
                        <i class="fas fa-quote-left quote-icon"></i>
                        <p class="quote-text" id="dyn_ceo_quote"></p>
                        <span class="quote-author" id="dyn_ceo_quote_author"></span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>
